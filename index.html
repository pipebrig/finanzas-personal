<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Finanzas</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0f0f0f;--surface:#1c1c1e;--surface2:#2c2c2e;--border:#3a3a3c;--text:#f2f2f7;--muted:#8e8e93;--green:#30d158;--red:#ff453a;--blue:#0a84ff;--amber:#ffd60a;--green-dim:rgba(48,209,88,0.12);--red-dim:rgba(255,69,58,0.12);--blue-dim:rgba(10,132,255,0.12);--amber-dim:rgba(255,214,10,0.12)}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding-bottom:80px;overflow-x:hidden}
#auth-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:40px;padding:32px}
.auth-logo{font-family:'DM Serif Display',serif;font-size:52px;letter-spacing:-1px;text-align:center}
.auth-sub{color:var(--muted);font-size:13px;letter-spacing:2px;text-transform:uppercase;margin-top:-30px;text-align:center}
.btn-google{display:flex;align-items:center;justify-content:center;gap:12px;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:16px 32px;border-radius:14px;font-family:'DM Sans',sans-serif;font-size:16px;cursor:pointer;width:100%;max-width:320px;font-weight:500}
.auth-note{font-size:12px;color:var(--muted);text-align:center;max-width:280px;line-height:1.5}
#app{display:none}
.topbar{position:sticky;top:0;z-index:50;background:var(--bg);padding:16px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.topbar-title{font-family:'DM Serif Display',serif;font-size:22px}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0 8px;gap:4px;cursor:pointer;color:var(--muted);font-size:10px;font-weight:500;transition:color 0.15s;border:none;background:none;font-family:'DM Sans',sans-serif}
.nav-tab.active{color:var(--blue)}
.nav-tab svg{width:22px;height:22px}
.section{display:none;padding:0}
.section.active{display:block}
.sec-inner{padding:0 16px 16px}
.month-bar{display:flex;align-items:center;justify-content:center;gap:20px;padding:14px 20px;background:var(--bg)}
.month-btn{background:var(--surface);border:1px solid var(--border);color:var(--text);width:36px;height:36px;border-radius:10px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.month-label{font-size:15px;font-weight:500;min-width:160px;text-align:center;text-transform:capitalize}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-card{background:var(--surface);border-radius:16px;padding:16px}
.stat-label{font-size:11px;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px}
.stat-value{font-family:'DM Serif Display',serif;font-size:26px;letter-spacing:-.5px;line-height:1}
.stat-value.green{color:var(--green)}.stat-value.red{color:var(--red)}.stat-value.blue{color:var(--blue)}
.list-card{background:var(--surface);border-radius:16px;padding:16px;margin-bottom:12px}
.list-card-title{font-size:13px;font-weight:500;color:var(--muted);margin-bottom:14px}
.tx-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.tx-item:last-child{border-bottom:none;padding-bottom:0}.tx-item:first-child{padding-top:0}
.tx-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.tx-info{flex:1;min-width:0}
.tx-desc{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-meta{font-size:12px;color:var(--muted);margin-top:2px}
.tx-right{text-align:right;flex-shrink:0}
.tx-amount{font-size:15px;font-weight:500}
.tx-amount.income{color:var(--green)}.tx-amount.expense{color:var(--red)}.tx-amount.investment{color:var(--blue)}
.tx-medio{font-size:11px;color:var(--muted);margin-top:2px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bar-row:last-child{margin-bottom:0}
.bar-label{font-size:13px;min-width:90px;color:var(--text)}
.bar-bg{flex:1;background:var(--surface2);border-radius:3px;height:4px}
.bar-fill{height:4px;border-radius:3px}
.bar-amount{font-size:12px;color:var(--muted);min-width:70px;text-align:right}
.form-wrap{padding:16px}
.tipo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.tipo-btn{padding:12px 8px;border:1.5px solid var(--border);border-radius:12px;background:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;text-align:center}
.tipo-btn.active-gasto{background:var(--red-dim);border-color:var(--red);color:var(--red)}
.tipo-btn.active-ingreso{background:var(--green-dim);border-color:var(--green);color:var(--green)}
.tipo-btn.active-inversion{background:var(--blue-dim);border-color:var(--blue);color:var(--blue)}
.tipo-btn.active-deuda{background:var(--amber-dim);border-color:var(--amber);color:var(--amber)}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:12px;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px}
.form-input,.form-select{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:14px 16px;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:16px;-webkit-appearance:none;appearance:none}
.form-input:focus,.form-select:focus{outline:none;border-color:var(--blue)}
.form-input::placeholder{color:#555}
.form-select option{background:#1c1c1e}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-submit{width:100%;padding:16px;background:var(--blue);color:#fff;border:none;border-radius:14px;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:500;cursor:pointer;margin-top:8px}
.btn-submit:disabled{opacity:.4}
.bolsillo-card{background:var(--surface);border-radius:16px;padding:20px;margin-bottom:12px}
.bolsillo-name{font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:2px}
.bolsillo-tipo{font-size:12px;color:var(--muted);margin-bottom:16px}
.bolsillo-amount{font-family:'DM Serif Display',serif;font-size:32px;color:var(--blue);letter-spacing:-.5px}
.bolsillo-sub{font-size:12px;color:var(--muted);margin-top:4px}
.presupuesto-item{padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer}
.presupuesto-item:last-child{border-bottom:none}
.pres-header{display:flex;justify-content:space-between;margin-bottom:8px}
.pres-cat{font-size:14px;font-weight:500}
.pres-amounts{font-size:13px;color:var(--muted)}
.pres-bar-bg{background:var(--surface2);border-radius:3px;height:4px}
.pres-bar-fill{height:4px;border-radius:3px}
.mercado-card{background:var(--surface);border-radius:16px;padding:20px;margin-bottom:12px}
.mercado-label{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.mercado-value{font-family:'DM Serif Display',serif;font-size:30px;margin-bottom:10px}
.mercado-sub{font-size:13px;color:var(--muted);line-height:1.6}
.mercado-sub strong{color:var(--text);font-weight:500}
.chips{display:flex;gap:8px;overflow-x:auto;padding:12px 16px;margin:0 -16px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--muted);font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;white-space:nowrap}
.chip.active{background:var(--surface2);color:var(--text);border-color:#555}
.badge{display:inline-block;background:var(--amber-dim);color:var(--amber);border-radius:4px;font-size:10px;padding:1px 5px;margin-left:4px;vertical-align:middle}
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px;line-height:1.6}
#toast{position:fixed;bottom:90px;left:16px;right:16px;background:var(--surface2);color:var(--text);padding:14px 18px;border-radius:12px;font-size:14px;text-align:center;transform:translateY(20px);opacity:0;transition:all .3s;z-index:999;pointer-events:none}
#toast.show{transform:translateY(0);opacity:1}
#toast.success{border:1px solid var(--green)}
#toast.error{border:1px solid var(--red)}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{text-align:center;padding:40px;color:var(--muted);font-size:14px}
.disclaimer{background:var(--surface2);border-radius:10px;padding:12px 14px;font-size:12px;color:var(--muted);line-height:1.5;margin-top:8px}
</style>
</head>
<body>

<div id="auth-screen">
  <div>
    <div class="auth-logo">Finanzas</div>
    <div class="auth-sub">Personal</div>
  </div>
  <button class="btn-google" onclick="signIn()">
    <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z"/><path fill="#FBBC05" d="M3.964 10.707A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.961L3.964 6.293C4.672 4.166 6.656 3.58 9 3.58z"/></svg>
    Continuar con Google
  </button>
  <div class="auth-note">Tus datos quedan en tu propia Google Sheet, nadie más los ve.</div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-title" id="topbar-title">Dashboard</div>
  </div>

  <!-- DASHBOARD -->
  <div class="section active" id="sec-dashboard">
    <div class="month-bar">
      <button class="month-btn" onclick="cambiarMes(-1)">←</button>
      <div class="month-label" id="mes-label">—</div>
      <button class="month-btn" onclick="cambiarMes(1)">→</button>
    </div>
    <div class="sec-inner">
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">Ingresos</div><div class="stat-value green" id="dash-ingresos">$0</div></div>
        <div class="stat-card"><div class="stat-label">Gastos</div><div class="stat-value red" id="dash-gastos">$0</div></div>
        <div class="stat-card"><div class="stat-label">Balance</div><div class="stat-value green" id="dash-balance">$0</div></div>
        <div class="stat-card"><div class="stat-label">Invertido</div><div class="stat-value blue" id="dash-invertido">$0</div></div>
      </div>
      <div class="list-card"><div class="list-card-title">Por medio de pago</div><div id="dash-medios"></div></div>
      <div class="list-card"><div class="list-card-title">Por categoría</div><div id="dash-cats"></div></div>
      <div class="list-card"><div class="list-card-title">Últimos movimientos</div><div id="dash-tx"></div></div>
    </div>
  </div>

  <!-- CARGAR -->
  <div class="section" id="sec-cargar">
    <div class="form-wrap">
      <div class="tipo-grid">
        <button class="tipo-btn active-gasto" onclick="setTipo('gasto',this)">Gasto</button>
        <button class="tipo-btn" onclick="setTipo('ingreso',this)">Ingreso</button>
        <button class="tipo-btn" onclick="setTipo('inversion',this)">Inversión</button>
        <button class="tipo-btn" onclick="setTipo('deuda',this)">Deuda / Cuota</button>
      </div>
      <div class="form-group"><label class="form-label">Descripción</label><input class="form-input" id="f-desc" type="text" placeholder="¿En qué gastaste?"></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Monto</label><input class="form-input" id="f-monto" type="number" inputmode="decimal" placeholder="0"></div>
        <div class="form-group"><label class="form-label">Moneda</label><select class="form-select" id="f-moneda"><option value="ARS">ARS $</option><option value="USD">USD U$S</option></select></div>
      </div>
      <div class="form-group" id="grupo-categoria"><label class="form-label">Categoría</label><select class="form-select" id="f-categoria"><option>Vivienda</option><option>Supermercado</option><option>Transporte</option><option>Salud</option><option>Educación</option><option>Restaurantes y salidas</option><option>Entretenimiento</option><option>Ropa y cuidado personal</option><option>Tecnología</option><option>Otros</option></select></div>
      <div class="form-group" id="grupo-medio"><label class="form-label">Medio de pago</label><select class="form-select" id="f-medio"><option value="Efectivo">Efectivo</option><option value="Débito">Débito</option><option value="Visa">Visa (propia)</option><option value="Mastercard">Mastercard (propia)</option><option value="Visa Pili">Visa Pili</option><option value="Visa Papa">Visa Papá</option></select></div>
      <div class="form-group" id="grupo-cuotas" style="display:none"><label class="form-label">Cuotas</label><select class="form-select" id="f-cuotas"><option value="1">1 cuota (contado)</option><option value="2">2 cuotas</option><option value="3">3 cuotas</option><option value="6">6 cuotas</option><option value="9">9 cuotas</option><option value="12">12 cuotas</option><option value="18">18 cuotas</option><option value="24">24 cuotas</option></select></div>
      <div class="form-group" id="grupo-bolsillo" style="display:none"><label class="form-label">Bolsillo</label><select class="form-select" id="f-bolsillo"><option value="Jubilación">Jubilación</option><option value="Ahorro">Ahorro</option></select></div>
      <div class="form-group" id="grupo-mov-inversion" style="display:none"><label class="form-label">Movimiento</label><select class="form-select" id="f-mov-inversion"><option value="Aporte">Aporte — pongo plata</option><option value="Retiro">Retiro — saco plata</option></select></div>
      <div class="form-group"><label class="form-label">Fecha</label><input class="form-input" id="f-fecha" type="date"></div>
      <div class="form-group"><label class="form-label">Nota (opcional)</label><input class="form-input" id="f-nota" type="text" placeholder="Detalle adicional"></div>
      <button class="btn-submit" id="btn-guardar" onclick="guardarMovimiento()">Guardar</button>
    </div>
  </div>

  <!-- BOLSILLOS -->
  <div class="section" id="sec-bolsillos">
    <div class="sec-inner" style="padding-top:16px"><div id="bolsillos-list"></div></div>
  </div>

  <!-- HISTORIAL -->
  <div class="section" id="sec-historial">
    <div class="month-bar">
      <button class="month-btn" onclick="cambiarMes(-1)">←</button>
      <div class="month-label" id="mes-label-2">—</div>
      <button class="month-btn" onclick="cambiarMes(1)">→</button>
    </div>
    <div class="sec-inner">
      <div class="chips" id="historial-chips"></div>
      <div id="historial-list"></div>
    </div>
  </div>

  <!-- MÁS -->
  <div class="section" id="sec-mas">
    <div class="month-bar">
      <button class="month-btn" onclick="cambiarMes(-1)">←</button>
      <div class="month-label" id="mes-label-3">—</div>
      <button class="month-btn" onclick="cambiarMes(1)">→</button>
    </div>
    <div class="sec-inner">
      <div style="font-size:16px;font-weight:500;margin-bottom:12px">Presupuesto</div>
      <div class="list-card" id="presupuesto-content" style="margin-bottom:24px"></div>
      <div style="font-size:16px;font-weight:500;margin-bottom:12px">Reporte del mes</div>
      <div id="reporte-content"></div>
      <div style="font-size:16px;font-weight:500;margin:24px 0 12px">Mercado</div>
      <div id="mercado-content"><div class="loading"><div class="spinner"></div>Cargando...</div></div>
      <div style="margin-top:24px;padding-top:16px;border-top:1px solid var(--border)">
        <button onclick="signOut()" style="background:none;border:1px solid var(--border);color:var(--muted);padding:12px 20px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;width:100%">Cerrar sesión</button>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-tab active" onclick="showSection('dashboard',this,'Dashboard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Inicio
    </button>
    <button class="nav-tab" onclick="showSection('cargar',this,'Nuevo movimiento')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      Cargar
    </button>
    <button class="nav-tab" onclick="showSection('bolsillos',this,'Bolsillos')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 7H4a2 2 0 00-2 2v10a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/></svg>
      Bolsillos
    </button>
    <button class="nav-tab" onclick="showSection('historial',this,'Historial')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>
      Historial
    </button>
    <button class="nav-tab" onclick="showSection('mas',this,'Más')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
      Más
    </button>
  </nav>
</div>

<div id="toast"></div>

<script>
const CLIENT_ID='827301318491-3qlunvim22nhmmdgqov3iqni68ftp389.apps.googleusercontent.com';
const SHEET_ID='1kZqOSoKINBhL8gpI0DqwIM3tJ7nZOx6caS6_fY7ecAA';
const SCOPES='https://www.googleapis.com/auth/spreadsheets';
let tokenClient,accessToken,mesActual=new Date(),tipoActual='gasto',txCache=[],bolsillosData=[],presupuestoData=[],filtroActivo='todos',dolarCache=1000;

function initGoogleAuth(){
  const s=document.createElement('script');
  s.src='https://accounts.google.com/gsi/client';
  s.onload=()=>{
    // Token client para login manual
    tokenClient=google.accounts.oauth2.initTokenClient({
      client_id:CLIENT_ID,scope:SCOPES,
      callback:async(resp)=>{
        if(resp.error)return;
        accessToken=resp.access_token;
        // Guardar email para auto-login
        try{
          const r=await fetch('https://www.googleapis.com/oauth2/v3/userinfo',{headers:{Authorization:'Bearer '+accessToken}});
          const u=await r.json();
          localStorage.setItem('fp_email',u.email);
        }catch(e){}
        entrarApp();
      }
    });
    // Intentar auto-login silencioso
    const savedEmail=localStorage.getItem('fp_email');
    if(savedEmail){
      const silentClient=google.accounts.oauth2.initTokenClient({
        client_id:CLIENT_ID,scope:SCOPES,
        prompt:'none',
        login_hint:savedEmail,
        callback:async(resp)=>{
          if(resp.error){
            // Si falla el auto-login, mostrar pantalla de login
            document.getElementById('auth-screen').style.display='flex';
            return;
          }
          accessToken=resp.access_token;
          entrarApp();
        }
      });
      silentClient.requestAccessToken();
    } else {
      document.getElementById('auth-screen').style.display='flex';
    }
  };
  document.head.appendChild(s);
}

async function entrarApp(){
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app').style.display='block';
  await initSheet();await cargarTodo();
  // Refrescar token cada 45 minutos automáticamente
  setInterval(()=>{
    const savedEmail=localStorage.getItem('fp_email');
    if(!savedEmail)return;
    const refreshClient=google.accounts.oauth2.initTokenClient({
      client_id:CLIENT_ID,scope:SCOPES,prompt:'none',login_hint:savedEmail,
      callback:(resp)=>{if(!resp.error)accessToken=resp.access_token;}
    });
    refreshClient.requestAccessToken();
  },45*60*1000);
}

function signIn(){tokenClient.requestAccessToken();}
function signOut(){
  accessToken=null;
  localStorage.removeItem('fp_email');
  document.getElementById('app').style.display='none';
  document.getElementById('auth-screen').style.display='flex';
}

async function sheetsGet(range){
  const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(range)}`,{headers:{Authorization:'Bearer '+accessToken}});
  const d=await r.json();return d.values||[];
}
async function sheetsAppend(range,values){
  await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(range)}:append?valueInputOption=USER_ENTERED`,{method:'POST',headers:{Authorization:'Bearer '+accessToken,'Content-Type':'application/json'},body:JSON.stringify({values})});
}
async function sheetsUpdate(range,values){
  await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(range)}?valueInputOption=USER_ENTERED`,{method:'PUT',headers:{Authorization:'Bearer '+accessToken,'Content-Type':'application/json'},body:JSON.stringify({values})});
}
async function sheetsBatch(requests){
  await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}:batchUpdate`,{method:'POST',headers:{Authorization:'Bearer '+accessToken,'Content-Type':'application/json'},body:JSON.stringify({requests})});
}

async function initSheet(){
  const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}`,{headers:{Authorization:'Bearer '+accessToken}});
  const meta=await r.json();
  const sheets=meta.sheets.map(s=>s.properties.title);
  const needed=['Transacciones','Bolsillos','Presupuesto','Deudas','Mercado','Reportes'];
  const toCreate=needed.filter(n=>!sheets.includes(n));
  if(toCreate.length>0){
    await sheetsBatch(toCreate.map(title=>({addSheet:{properties:{title}}})));
    await sheetsUpdate('Transacciones!A1:J1',[['Fecha','Tipo','Descripción','Categoría','Monto','Moneda','Medio de pago','Cuotas','Bolsillo','Nota']]);
    await sheetsUpdate('Bolsillos!A1:E1',[['Nombre','Instrumento','Moneda','Total aportado','Notas']]);
    await sheetsUpdate('Presupuesto!A1:D1',[['Mes','Categoría','Límite','Gastado']]);
    await sheetsAppend('Bolsillos!A:E',[['Jubilación','CEDEARs S&P 500','USD','0','Jubilación de largo plazo'],['Ahorro','Fondo FIMA','ARS','0','Ahorro general']]);
  }
}

function mesKey(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;}
function mesNombre(d){return d.toLocaleDateString('es-AR',{month:'long',year:'numeric'});}
function txDelMes(mes){return txCache.filter(t=>t.fecha.startsWith(mes));}
function fmt(n,moneda='ARS'){
  if(moneda==='USD')return'U$S '+n.toLocaleString('es-AR',{minimumFractionDigits:0,maximumFractionDigits:0});
  if(n>=1000000)return'$ '+(n/1000000).toFixed(1)+'M';
  if(n>=1000)return'$ '+Math.round(n/1000)+'k';
  return'$ '+Math.round(n).toLocaleString('es-AR');
}
function actualizarLabels(){
  const n=mesNombre(mesActual);
  ['mes-label','mes-label-2','mes-label-3'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=n;});
}
function cambiarMes(dir){
  mesActual=new Date(mesActual.getFullYear(),mesActual.getMonth()+dir,1);
  actualizarLabels();renderDashboard();renderHistorial();renderPresupuesto();renderReporte();
}

async function cargarTodo(){
  actualizarLabels();
  await Promise.all([cargarTransacciones(),cargarBolsillos(),cargarPresupuesto()]);
  renderDashboard();renderBolsillos();renderHistorial();renderPresupuesto();renderReporte();cargarMercado();
}
async function cargarTransacciones(){
  const rows=await sheetsGet('Transacciones!A2:J');
  txCache=rows.map(r=>({fecha:r[0]||'',tipo:r[1]||'',desc:r[2]||'',categoria:r[3]||'',monto:parseFloat(r[4])||0,moneda:r[5]||'ARS',medio:r[6]||'',cuotas:r[7]||'1',bolsillo:r[8]||'',nota:r[9]||''}));
}
async function cargarBolsillos(){
  const rows=await sheetsGet('Bolsillos!A2:E');
  bolsillosData=rows.map(r=>({nombre:r[0]||'',instrumento:r[1]||'',moneda:r[2]||'ARS',total:parseFloat(r[3])||0,notas:r[4]||''}));
  const sel=document.getElementById('f-bolsillo');
  sel.innerHTML=bolsillosData.map(b=>`<option value="${b.nombre}">${b.nombre}</option>`).join('');
}
async function cargarPresupuesto(){
  const rows=await sheetsGet('Presupuesto!A2:D');
  presupuestoData=rows.map(r=>({mes:r[0]||'',categoria:r[1]||'',limite:parseFloat(r[2])||0,gastado:parseFloat(r[3])||0}));
}

function renderDashboard(){
  const mes=mesKey(mesActual),txs=txDelMes(mes);
  const ingresos=txs.filter(t=>t.tipo==='ingreso').reduce((s,t)=>s+t.monto,0);
  const gastos=txs.filter(t=>t.tipo==='gasto').reduce((s,t)=>s+t.monto,0);
  const invertido=txs.filter(t=>t.tipo==='inversion').reduce((s,t)=>s+t.monto,0);
  const balance=ingresos-gastos;
  document.getElementById('dash-ingresos').textContent=fmt(ingresos);
  document.getElementById('dash-gastos').textContent=fmt(gastos);
  document.getElementById('dash-balance').textContent=fmt(balance);
  document.getElementById('dash-balance').className='stat-value '+(balance>=0?'green':'red');
  document.getElementById('dash-invertido').textContent=fmt(invertido);
  const gastosTx=txs.filter(t=>t.tipo==='gasto'),totalG=gastosTx.reduce((s,t)=>s+t.monto,0);
  const medios={};gastosTx.forEach(t=>{medios[t.medio]=(medios[t.medio]||0)+t.monto;});
  const mediosEl=document.getElementById('dash-medios');
  if(!totalG){mediosEl.innerHTML='<div style="color:var(--muted);font-size:13px">Sin gastos este mes</div>';}
  else{mediosEl.innerHTML=Object.entries(medios).sort((a,b)=>b[1]-a[1]).map(([m,v])=>`<div class="bar-row"><div class="bar-label">${m}</div><div class="bar-bg"><div class="bar-fill" style="width:${v/totalG*100}%;background:var(--blue)"></div></div><div class="bar-amount">${fmt(v)}</div></div>`).join('');}
  const cats={};gastosTx.forEach(t=>{cats[t.categoria]=(cats[t.categoria]||0)+t.monto;});
  const catsEl=document.getElementById('dash-cats');
  if(!totalG){catsEl.innerHTML='<div style="color:var(--muted);font-size:13px">Sin gastos este mes</div>';}
  else{catsEl.innerHTML=Object.entries(cats).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([c,v])=>`<div class="bar-row"><div class="bar-label">${c}</div><div class="bar-bg"><div class="bar-fill" style="width:${v/totalG*100}%;background:var(--red)"></div></div><div class="bar-amount">${fmt(v)}</div></div>`).join('');}
  const recientes=[...txs].reverse().slice(0,6);
  const dashTx=document.getElementById('dash-tx');
  if(!recientes.length){dashTx.innerHTML='<div style="color:var(--muted);font-size:13px">Sin movimientos este mes</div>';}
  else{dashTx.innerHTML=recientes.map(txRow).join('');}
}

function txRow(t){
  const icons={gasto:'↓',ingreso:'↑',inversion:'◎',deuda:'⊟'};
  const bgs={gasto:'var(--red-dim)',ingreso:'var(--green-dim)',inversion:'var(--blue-dim)',deuda:'var(--amber-dim)'};
  const cls={gasto:'expense',ingreso:'income',inversion:'investment',deuda:'expense'};
  const badge=parseInt(t.cuotas)>1?`<span class="badge">${t.cuotas}c</span>`:'';
  return`<div class="tx-item"><div class="tx-icon" style="background:${bgs[t.tipo]}">${icons[t.tipo]}</div><div class="tx-info"><div class="tx-desc">${t.desc}${badge}</div><div class="tx-meta">${t.fecha} · ${t.categoria||t.bolsillo||t.tipo}</div></div><div class="tx-right"><div class="tx-amount ${cls[t.tipo]}">${t.tipo==='ingreso'?'+':''}${fmt(t.monto,t.moneda)}</div><div class="tx-medio">${t.medio||''}</div></div></div>`;
}

function renderBolsillos(){
  const list=document.getElementById('bolsillos-list');
  if(!bolsillosData.length){list.innerHTML='<div class="empty">Sin bolsillos</div>';return;}
  const totales={};
  txCache.filter(t=>t.tipo==='inversion').forEach(t=>{totales[t.bolsillo]=(totales[t.bolsillo]||0)+t.monto;});
  list.innerHTML=bolsillosData.map(b=>{
    const total=totales[b.nombre]||b.total;
    const movs=txCache.filter(t=>t.tipo==='inversion'&&t.bolsillo===b.nombre).length;
    return`<div class="bolsillo-card"><div class="bolsillo-name">${b.nombre}</div><div class="bolsillo-tipo">${b.instrumento} · ${b.moneda}</div><div class="bolsillo-amount">${fmt(total,b.moneda)}</div><div class="bolsillo-sub">${movs} movimiento${movs!==1?'s':''} registrado${movs!==1?'s':''}</div></div>`;
  }).join('');
}

function renderHistorial(){
  const mes=mesKey(mesActual);
  document.getElementById('mes-label-2').textContent=mesNombre(mesActual);
  const txs=txDelMes(mes);
  const chips=document.getElementById('historial-chips');
  const tipos=['todos','gasto','ingreso','inversion','deuda'];
  const labels=['Todos','Gastos','Ingresos','Inversiones','Deudas'];
  chips.innerHTML=tipos.map((t,i)=>`<button class="chip ${filtroActivo===t?'active':''}" onclick="setFiltro('${t}')">${labels[i]}</button>`).join('');
  const filtered=filtroActivo==='todos'?txs:txs.filter(t=>t.tipo===filtroActivo);
  const list=document.getElementById('historial-list');
  if(!filtered.length){list.innerHTML='<div class="empty">Sin movimientos para este período</div>';return;}
  list.innerHTML=[...filtered].reverse().map(txRow).join('');
}
function setFiltro(f){filtroActivo=f;renderHistorial();}

function renderPresupuesto(){
  document.getElementById('mes-label-3').textContent=mesNombre(mesActual);
  const mes=mesKey(mesActual);
  const gastosTx=txDelMes(mes).filter(t=>t.tipo==='gasto');
  const cats=['Vivienda','Supermercado','Transporte','Salud','Educación','Restaurantes y salidas','Entretenimiento','Ropa y cuidado personal','Tecnología','Otros'];
  const gastadoPorCat={};gastosTx.forEach(t=>{gastadoPorCat[t.categoria]=(gastadoPorCat[t.categoria]||0)+t.monto;});
  const limitePorCat={};presupuestoData.filter(p=>p.mes===mes).forEach(p=>{limitePorCat[p.categoria]=p.limite;});
  const el=document.getElementById('presupuesto-content');
  el.innerHTML=`<div style="font-size:12px;color:var(--muted);margin-bottom:12px">Tocá una categoría para editar el límite</div>${cats.map(cat=>{
    const g=gastadoPorCat[cat]||0,l=limitePorCat[cat]||0;
    const pct=l>0?Math.min(g/l*100,100):0;
    const color=pct>90?'var(--red)':pct>70?'var(--amber)':'var(--green)';
    return`<div class="presupuesto-item" onclick="editarPresupuesto('${cat}',${l},'${mes}')"><div class="pres-header"><span class="pres-cat">${cat}</span><span class="pres-amounts">${fmt(g)}${l>0?' / '+fmt(l):''}</span></div><div class="pres-bar-bg"><div class="pres-bar-fill" style="width:${pct}%;background:${color}"></div></div></div>`;
  }).join('')}`;
}
async function editarPresupuesto(cat,limiteActual,mes){
  const nuevo=prompt(`Límite para "${cat}"\nActual: ${limiteActual>0?fmt(limiteActual):'sin límite'}\n\nIngresá el monto en ARS:`);
  if(nuevo===null)return;const monto=parseFloat(nuevo);if(isNaN(monto))return;
  const idx=presupuestoData.findIndex(p=>p.mes===mes&&p.categoria===cat);
  if(idx>=0){await sheetsUpdate(`Presupuesto!C${idx+2}`,[[monto]]);presupuestoData[idx].limite=monto;}
  else{await sheetsAppend('Presupuesto!A:D',[[mes,cat,monto,0]]);presupuestoData.push({mes,categoria:cat,limite:monto,gastado:0});}
  showToast('Límite actualizado','success');renderPresupuesto();
}

async function cargarMercado(){
  const el=document.getElementById('mercado-content');
  try{
    const r=await fetch('https://api.bluelytics.com.ar/v2/latest');
    const d=await r.json();
    const oficial=d.oficial?.value_sell||null;
    if(oficial)dolarCache=oficial;
    el.innerHTML=`
      <div class="mercado-card"><div class="mercado-label">Dólar oficial</div><div class="mercado-value" style="color:var(--amber)">${oficial?'$ '+Math.round(oficial).toLocaleString('es-AR'):'—'}</div><div class="mercado-sub"><strong>¿Qué es?</strong> El tipo de cambio oficial del banco. Cuando cargás un gasto en USD, lo convertimos a este valor para mostrarte el total en pesos.</div></div>
      <div class="mercado-card"><div class="mercado-label">S&P 500 — tu Jubilación</div><div class="mercado-value" style="color:var(--blue)">Índice EE.UU.</div><div class="mercado-sub"><strong>¿Qué es?</strong> El índice de las 500 empresas más grandes de EE.UU. Tus CEDEARs siguen este índice. En el largo plazo sube históricamente un 10% anual en dólares. Cada mes que aportás promediás el precio de compra.</div></div>
      <div class="mercado-card"><div class="mercado-label">Fondo FIMA — tu Ahorro</div><div class="mercado-value" style="color:var(--green)">Money Market</div><div class="mercado-sub"><strong>¿Qué es?</strong> Un fondo de muy bajo riesgo. Tu plata rinde más que parada y podés sacarla cualquier día. Ideal para el dinero que podés necesitar pronto.</div></div>
      <div class="disclaimer">Esta información es solo contexto educativo, no asesoramiento financiero. Para decisiones importantes consultá con un profesional.</div>
      <div style="font-size:11px;color:var(--muted);text-align:right;margin-top:8px">Actualizado: ${new Date().toLocaleString('es-AR')}</div>`;
  }catch(e){el.innerHTML='<div class="empty">No se pudieron cargar los datos.<br>Verificá tu conexión.</div>';}
}

function renderReporte(){
  const mes=mesKey(mesActual),txs=txDelMes(mes),el=document.getElementById('reporte-content');
  if(!txs.length){el.innerHTML='<div class="empty" style="padding:20px 0">Sin movimientos este mes</div>';return;}
  const gastos=txs.filter(t=>t.tipo==='gasto'),ingresos=txs.filter(t=>t.tipo==='ingreso'),inversiones=txs.filter(t=>t.tipo==='inversion');
  const tG=gastos.reduce((s,t)=>s+t.monto,0),tI=ingresos.reduce((s,t)=>s+t.monto,0),tInv=inversiones.reduce((s,t)=>s+t.monto,0);
  const balance=tI-tG,tasaAhorro=tI>0?Math.round(balance/tI*100):null;
  const medios={};gastos.forEach(t=>{medios[t.medio]=(medios[t.medio]||0)+t.monto;});
  const cats={};gastos.forEach(t=>{cats[t.categoria]=(cats[t.categoria]||0)+t.monto;});
  const topCat=Object.entries(cats).sort((a,b)=>b[1]-a[1])[0];
  el.innerHTML=`
    <div class="stats-grid" style="margin-bottom:12px">
      <div class="stat-card"><div class="stat-label">Ingresos</div><div class="stat-value green">${fmt(tI)}</div></div>
      <div class="stat-card"><div class="stat-label">Gastos</div><div class="stat-value red">${fmt(tG)}</div></div>
      <div class="stat-card"><div class="stat-label">Balance</div><div class="stat-value ${balance>=0?'green':'red'}">${fmt(balance)}</div></div>
      <div class="stat-card"><div class="stat-label">Invertido</div><div class="stat-value blue">${fmt(tInv)}</div></div>
    </div>
    <div class="list-card" style="margin-bottom:12px"><div class="list-card-title">Por categoría</div>${Object.entries(cats).sort((a,b)=>b[1]-a[1]).map(([c,v])=>`<div class="bar-row"><div class="bar-label">${c}</div><div class="bar-bg"><div class="bar-fill" style="width:${tG?v/tG*100:0}%;background:var(--red)"></div></div><div class="bar-amount">${fmt(v)}</div></div>`).join('')}</div>
    <div class="list-card" style="margin-bottom:12px"><div class="list-card-title">Por medio de pago</div>${Object.entries(medios).sort((a,b)=>b[1]-a[1]).map(([m,v])=>`<div class="bar-row"><div class="bar-label">${m}</div><div class="bar-bg"><div class="bar-fill" style="width:${tG?v/tG*100:0}%;background:var(--blue)"></div></div><div class="bar-amount">${fmt(v)}</div></div>`).join('')}</div>
    <div class="list-card"><div class="list-card-title">Resumen</div><div style="font-size:14px;color:var(--muted);line-height:2">Movimientos: <span style="color:var(--text)">${txs.length}</span><br>Mayor categoría: <span style="color:var(--text)">${topCat?topCat[0]:'—'}</span><br>Tasa de ahorro: <span style="color:${tasaAhorro!==null&&tasaAhorro>=0?'var(--green)':'var(--red)'}">${tasaAhorro!==null?tasaAhorro+'%':'—'}</span>${tInv>0&&tI>0?`<br>% invertido: <span style="color:var(--blue)">${Math.round(tInv/tI*100)}%</span>`:''}</div></div>`;
}

function setTipo(tipo,btn){
  tipoActual=tipo;
  document.querySelectorAll('.tipo-btn').forEach(b=>b.className='tipo-btn');
  btn.className=`tipo-btn active-${tipo}`;
  document.getElementById('grupo-categoria').style.display=['gasto','deuda'].includes(tipo)?'':'none';
  document.getElementById('grupo-medio').style.display=['gasto','deuda'].includes(tipo)?'':'none';
  document.getElementById('grupo-cuotas').style.display=tipo==='gasto'?'':'none';
  document.getElementById('grupo-bolsillo').style.display=tipo==='inversion'?'':'none';
  document.getElementById('grupo-mov-inversion').style.display=tipo==='inversion'?'':'none';
  document.getElementById('f-desc').placeholder=tipo==='gasto'?'¿En qué gastaste?':tipo==='ingreso'?'¿De dónde vino?':tipo==='inversion'?'Ej: Aporte mensual':'¿Qué deuda es?';
}

async function guardarMovimiento(){
  const desc=document.getElementById('f-desc').value.trim();
  const monto=parseFloat(document.getElementById('f-monto').value);
  const moneda=document.getElementById('f-moneda').value;
  const fecha=document.getElementById('f-fecha').value;
  const nota=document.getElementById('f-nota').value.trim();
  if(!desc||!monto||!fecha){showToast('Completá descripción, monto y fecha','error');return;}
  const btn=document.getElementById('btn-guardar');
  btn.disabled=true;btn.textContent='Guardando...';
  try{
    const categoria=['gasto','deuda'].includes(tipoActual)?document.getElementById('f-categoria').value:'';
    const medio=['gasto','deuda'].includes(tipoActual)?document.getElementById('f-medio').value:'';
    const cuotas=tipoActual==='gasto'?document.getElementById('f-cuotas').value:'1';
    const bolsillo=tipoActual==='inversion'?document.getElementById('f-bolsillo').value:'';
    const movInv=tipoActual==='inversion'?document.getElementById('f-mov-inversion').value:'';
    const rows=[];
    if(parseInt(cuotas)>1){
      const mc=monto/parseInt(cuotas),fb=new Date(fecha+'T12:00:00');
      for(let i=0;i<parseInt(cuotas);i++){
        const f=new Date(fb.getFullYear(),fb.getMonth()+i,fb.getDate());
        rows.push([f.toISOString().split('T')[0],tipoActual,`${desc} (${i+1}/${cuotas})`,categoria,mc.toFixed(2),moneda,medio,cuotas,bolsillo,nota]);
      }
    }else{rows.push([fecha,tipoActual,desc,categoria,monto,moneda,medio,'1',bolsillo,nota]);}
    for(const row of rows)await sheetsAppend('Transacciones!A:J',[row]);
    if(tipoActual==='inversion'&&bolsillo){
      const idx=bolsillosData.findIndex(b=>b.nombre===bolsillo);
      if(idx>=0){const delta=movInv==='Retiro'?-monto:monto;bolsillosData[idx].total=(bolsillosData[idx].total||0)+delta;await sheetsUpdate(`Bolsillos!D${idx+2}`,[[bolsillosData[idx].total]]);}
    }
    showToast(parseInt(cuotas)>1?`${cuotas} cuotas guardadas`:'Guardado','success');
    document.getElementById('f-desc').value='';document.getElementById('f-monto').value='';document.getElementById('f-nota').value='';
    await cargarTransacciones();if(tipoActual==='inversion')await cargarBolsillos();
    renderDashboard();renderBolsillos();renderHistorial();renderReporte();
  }catch(e){showToast('Error al guardar. Intentá de nuevo.','error');console.error(e);}
  btn.disabled=false;btn.textContent='Guardar';
}

function showSection(name,btn,title){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('sec-'+name).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('topbar-title').textContent=title;
  window.scrollTo(0,0);
}

let toastT;
function showToast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='show '+type;
  clearTimeout(toastT);toastT=setTimeout(()=>{t.className='';},3000);
}

document.getElementById('f-fecha').value=new Date().toISOString().split('T')[0];
setTipo('gasto',document.querySelector('.tipo-btn'));
initGoogleAuth();
